<!DOCTYPE html>
<html>
<head>
    <title>TELC B2 Test</title>
</head>
<body>
    <h1>If you can see this, the deployment is working!</h1>
    <p>Attempting to load questions...</p>
    <div id="status">Loading...</div>
    <script>
        fetch('./questions.json')
            .then(r => r.json())
            .then(data => {
                document.getElementById('status').innerHTML = '✓ Questions loaded! ' + Object.keys(data).length + ' sections found';
            })
            .catch(e => {
                document.getElementById('status').innerHTML = '✗ Error: ' + e.message;
            });
    </script>
</body>
</html>
